<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Learn to read a clock — hours and half hours" />
    <meta name="theme-color" content="#5b4fd4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>TimeTeacher</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
  </head>
  <body>
    <div id="start-overlay" class="start-overlay" role="dialog" aria-labelledby="start-title">
      <div class="start-card">
        <h1 id="start-title">TimeTeacher</h1>
        <p class="start-hint">Tap Start — then you will hear the questions (works best after a tap).</p>
        <div class="segmented segmented--start" role="group" aria-label="Mode">
          <button type="button" class="btn segmented__btn" id="btn-mode-start-time" aria-pressed="true">
            🕒 Time
          </button>
          <button type="button" class="btn segmented__btn" id="btn-mode-start-numbers" aria-pressed="false">
            🔢 Numbers
          </button>
          <button type="button" class="btn segmented__btn" id="btn-mode-start-letters" aria-pressed="false">
            🔤 Letters
          </button>
        </div>
        <button type="button" class="btn btn--primary btn--xl" id="btn-start">▶️ Start</button>
      </div>
    </div>

    <main class="app" id="app" hidden>
      <header class="app__header">
        <h1 class="app__title">What time is it?</h1>
        <div class="app__actions">
          <button type="button" class="btn btn--ghost btn--icon" id="btn-home" aria-label="Back to start" title="Back to start">
            <span aria-hidden="true">←</span>
          </button>
          <div class="segmented" role="group" aria-label="Mode">
            <button type="button" class="btn segmented__btn" id="btn-mode-time" aria-pressed="true">Time</button>
            <button type="button" class="btn segmented__btn" id="btn-mode-numbers" aria-pressed="false">
              Numbers
            </button>
            <button type="button" class="btn segmented__btn" id="btn-mode-letters" aria-pressed="false">
              Letters
            </button>
          </div>
          <div id="session-scores" class="session-scores" aria-label="Score"></div>
          <label class="lang" for="lang" aria-label="Language">
            <span class="lang__label">Language</span>
            <select id="lang" class="lang__select">
              <option value="en">English</option>
              <option value="de">Deutsch</option>
            </select>
          </label>
          <button type="button" class="btn btn--ghost" id="btn-repeat" aria-label="Say the question again">
            <span class="btn__icon" aria-hidden="true">🔁</span>
            <span class="btn__label">Say it again</span>
          </button>
          <button type="button" class="btn btn--ghost" id="btn-hint" aria-label="Show a hint" hidden>
            <span class="btn__icon" aria-hidden="true">💡</span>
            <span class="btn__label">Hint</span>
          </button>
        </div>
      </header>

      <div class="clock-wrap" aria-hidden="true">
        <svg class="clock" viewBox="0 0 200 200" width="280" height="280">
          <defs>
            <!-- Arrow tips are drawn as polygons in JS (more reliable than SVG markers). -->
          </defs>
          <circle class="clock__face" cx="100" cy="100" r="92" />
          <g id="clock-ticks"></g>
          <g id="clock-numbers" class="clock__numbers" aria-hidden="true"></g>
          <g id="hand-minute" class="clock__hand clock__hand--minute"></g>
          <g id="hand-hour" class="clock__hand clock__hand--hour"></g>
          <circle class="clock__cap" cx="100" cy="100" r="4" />
        </svg>
      </div>

      <section class="numbers" id="numbers-panel" hidden aria-label="Number prompt">
        <div class="numbers__value" id="numbers-value" aria-hidden="true">42</div>
      </section>

      <section class="numbers" id="letters-panel" hidden aria-label="Letter prompt">
        <div class="numbers__value" id="letters-value" aria-hidden="true">A</div>
      </section>

      <section class="choices" aria-label="Answer choices">
        <p class="choices__hint" id="choices-hint">Listen, then tap the right answer.</p>
        <p class="choices__hint choices__hint--hint" id="hint-text" hidden></p>
        <div class="choices__grid" id="choices-root"></div>
      </section>

      <p class="sr-only" id="live-region" aria-live="polite"></p>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
